services:
  db:
    image: pgvector/pgvector:pg16
    container_name: admeta-db
    environment:
      POSTGRES_USER: admeta
      POSTGRES_PASSWORD: admeta
      POSTGRES_DB: admeta
    ports:
      - "5432:5432"
    volumes:
      - admeta_pgdata:/var/lib/postgresql/data
      # 최초 기동 시 스키마 자동 적용
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admeta"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  admeta_pgdata:
